<html lang="ko">

<body>
  <div class="announcement">Complimentary shipping on orders over ₩100,000</div>

    <div class="site-header__main">

      <a class="site-header__logo" href="index.html">ÉLANE</a>
      <div class="site-header__utils"><button class="site-header__util" type="button" data-search-open aria-label="검색"><i class="fa-solid fa-magnifying-glass"></i></button><a class="site-header__util" href="wishlist.html" aria-label="위시리스트"><i class="fa-regular fa-heart"></i><span class="site-header__badge" data-wish-count hidden>0</span></a><a class="site-header__util" href="cart.html" aria-label="장바구니"><i class="fa-solid fa-bag-shopping"></i><span class="site-header__badge" data-cart-count hidden>0</span></a><a class="site-header__util" href="mypage.html" aria-label="마이페이지"><i class="fa-regular fa-user"></i></a></div>
    </div>
  </header>
  <aside class="mobile-menu" id="mobile-menu" aria-hidden="true"><button class="mobile-menu__close" type="button" aria-label="메뉴 닫기">×</button><a class="mobile-menu__link" href="index.html">New</a><a class="mobile-menu__link" href="product_list.html">Shop</a><a class="mobile-menu__link" href="lookbook.html">Editorial</a><a class="mobile-menu__link" href="wishlist.html">Wishlist</a><a class="mobile-menu__link" href="mypage.html">My Élane</a></aside>

  <main module="product_list">
    <section class="page-hero"><p class="page-hero__eyebrow">The complete collection</p><h1 class="page-hero__title" data-list-title>Shop</h1></section>
    <div class="container">
      <nav class="category-nav" module="product_menupackage" aria-label="상품 카테고리">
        <a class="category-nav__link" data-list-category="all" href="product_list.html">ALL</a>
        <a class="category-nav__link" data-list-collection="new" href="product_list.html?collection=new">NEW</a>
        <a class="category-nav__link" data-list-category="clothing" href="product_list.html?category=clothing">CLOTHING</a>
        <a class="category-nav__link" data-list-category="bag" href="product_list.html?category=bag">BAG</a>
        <a class="category-nav__link" data-list-category="shoes" href="product_list.html?category=shoes">SHOES</a>
        <a class="category-nav__link" data-list-category="acc" href="product_list.html?category=acc">JEWELRY & ACC</a>
      </nav>
      <div class="list-toolbar"><p class="list-toolbar__count" data-list-count>0 ITEMS</p><select class="list-toolbar__select" data-list-sort aria-label="상품 정렬"><option value="newest">NEWEST</option><option value="low">LOW PRICE</option><option value="high">HIGH PRICE</option><option value="best">BEST SELLING</option></select></div>
      <div class="product-grid" module="product_listnormal" data-list-grid aria-live="polite"></div>
    </div>
